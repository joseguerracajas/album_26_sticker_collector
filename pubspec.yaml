name: album_26_sticker_collector
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+5

environment:
  sdk: ^3.11.3

dependencies:
  app_tracking_transparency: ^2.0.6+1
  animations: ^2.1.1
  brick_core: ^2.1.0
  brick_offline_first: ^4.0.0
  brick_offline_first_with_supabase: ^2.1.0
  brick_sqlite: ^4.1.0+1
  brick_supabase: ^2.1.1
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  google_mlkit_text_recognition: ^0.15.1
  google_mobile_ads: ^5.3.0
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  path: ^1.9.1
  purchases_flutter: ^8.8.0
  mobile_scanner: ^7.0.1
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^7.0.1
  sqflite: ^2.4.2
  supabase_flutter: ^2.12.0
  tutorial_coach_mark: ^1.2.11
  url_launcher: ^6.3.1
  uuid: ^4.5.3

dev_dependencies:
  brick_offline_first_with_supabase_build: ^2.1.0
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#000000" # Fondo negro
  image: "assets/icon/app_icon.png" # Tu escudo dorado
  
  # Opciones para Android 12+ (obligatorio para evitar iconos duplicados)
  android_12:
    color: "#000000"
    image: "assets/icon/app_icon.png"
    
  # Si quieres quehomes el logo no ocupe toda la pantalla
  fullscreen: true