# =============================================================================
# 🚀 Build & Deploy Pipeline
# =============================================================================
# Builds the Flutter app for Android and iOS, deploys Supabase changes.
# Triggered on merge to main or manual dispatch.
# =============================================================================

name: "🚀 Build & Deploy"

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - all
          - app-only
          - supabase-only

jobs:
  # ===========================================================================
  # Pre-deploy checks
  # ===========================================================================
  pre-checks:
    name: "✅ Pre-deploy Checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.3"
          channel: "stable"
          cache: true

      - name: "📦 Install dependencies"
        run: flutter pub get

      - name: "🔎 Analyze"
        run: flutter analyze

      - name: "🧪 Test"
        run: flutter test

  # ===========================================================================
  # Deploy Supabase
  # ===========================================================================
  deploy-supabase:
    name: "🗄️ Deploy Supabase"
    needs: pre-checks
    if: |
      github.event_name == 'push' || 
      inputs.deploy_target == 'all' || 
      inputs.deploy_target == 'supabase-only'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: "🔧 Setup Supabase CLI"
        uses: supabase/setup-cli@v1.4.0
        with:
          version: latest

      - name: "🗄️ Deploy Migrations"
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: "⚡ Deploy Edge Functions"
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ===========================================================================
  # Build Android
  # ===========================================================================
  build-android:
    name: "🤖 Build Android"
    needs: pre-checks
    if: |
      github.event_name == 'push' || 
      inputs.deploy_target == 'all' || 
      inputs.deploy_target == 'app-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.3"
          channel: "stable"
          cache: true

      - name: "☕ Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "📦 Install dependencies"
        run: flutter pub get

      - name: "🏗️ Build App Bundle"
        run: flutter build appbundle --release
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: "📤 Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/bundle/release/app-release.aab

      - name: "🛒 Deploy to Google Play (internal track)"
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.joseguerracajas.album26stickercollector
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  # ===========================================================================
  # Build iOS
  # ===========================================================================
  build-ios:
    name: "🍎 Build iOS"
    needs: pre-checks
    if: |
      github.event_name == 'push' || 
      inputs.deploy_target == 'all' || 
      inputs.deploy_target == 'app-only'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.3"
          channel: "stable"
          cache: true

      - name: "📦 Install dependencies"
        run: flutter pub get

      - name: "🏗️ Build IPA"
        run: flutter build ipa --release --no-codesign

      - name: "📤 Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
      - name: "✈️ Deploy to App Store Connect (TestFlight)"
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
  # ===========================================================================
  deploy-summary:
    name: "📊 Deploy Summary"
    needs: [deploy-supabase, build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "📝 Summary"
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase Migrations | ${{ needs.deploy-supabase.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Build | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS Build | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: "✅ Move In Progress issues to Done on Project Board"
        if: |
          needs.deploy-supabase.result == 'success' &&
          needs.build-android.result == 'success' &&
          needs.build-ios.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          PROJECT_DATA=$(gh api graphql -f query='
            query {
              user(login: "joseguerracajas") {
                projectV2(number: 1) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                  items(first: 100) {
                    nodes {
                      id
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2SingleSelectField { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          ')

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id')
          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].id')
          DONE_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].options[] | select(.name == "Done") | .id')

          IN_PROGRESS_ITEMS=$(echo "$PROJECT_DATA" | jq -r '
            .data.user.projectV2.items.nodes[] |
            select(.fieldValues.nodes[] | select(.field.name == "Status" and .name == "In Progress")) |
            .id
          ')

          for ITEM_ID in $IN_PROGRESS_ITEMS; do
            gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: { projectId: \"$PROJECT_ID\" itemId: \"$ITEM_ID\" fieldId: \"$STATUS_FIELD_ID\" value: { singleSelectOptionId: \"$DONE_ID\" } }) { projectV2Item { id } } }"
            echo "✅ Item $ITEM_ID moved to Done"
          done

          echo "🎉 All In Progress items moved to Done after successful deploy"

  # ===========================================================================
  # Notify issue on PR merge
  # ===========================================================================
  notify-issue-merged:
    name: "💬 Notify Issue on PR Merge"
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "🔍 Extract issue number from PR body"
        id: extract
        run: |
          BODY="${{ github.event.pull_request.body }}"
          ISSUE_NUM=$(echo "$BODY" | grep -oP '(?<=Closes #)\d+' | head -1 || echo '')
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: "💬 Comment on issue"
        if: steps.extract.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          ISSUE_NUM="${{ steps.extract.outputs.issue_number }}"
          printf '## 🎉 Feature Deployed!

PR [%s](%s) was merged to `main` and the deployment pipeline has been triggered.

| Target | Status |
|--------|--------|
| 📱 Google Play (internal track) | 🚀 Deploying... |
| 🍎 App Store Connect (TestFlight) | 🚀 Deploying... |
| 🗄️ Supabase Migrations | 🚀 Deploying... |

> Check the [Actions tab](https://github.com/${{ github.repository }}/actions) for live status.
' "$PR_TITLE" "$PR_URL" > /tmp/merged-comment.md
          gh issue comment "$ISSUE_NUM" \
            --repo ${{ github.repository }} \
            --body-file /tmp/merged-comment.md
