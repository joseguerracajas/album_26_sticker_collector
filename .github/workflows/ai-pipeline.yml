# =============================================================================
# 🤖 AI Multi-Agent Pipeline — LLM Powered
# =============================================================================
# Each agent calls GitHub Models API (gpt-4o) to generate real artifacts.
# Context: README.md (project structure) + .github/agents/*.md (system prompts)
# Feedback loop: comment "/feedback: <text>" on the issue before each approval.
# Generated code is committed to a feature branch; PR is created after QA.
#
# Flow: Issue → PM (HU) → Backend (Migrations) → Frontend (Code) → QA → PR → Deploy → Done
# =============================================================================

name: "🤖 AI Agent Pipeline"

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      feature_description:
        description: "Describe the feature you want to build"
        required: true
        type: string

concurrency:
  group: ai-pipeline-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: write
  pull-requests: write
  repository-projects: write

env:
  BRANCH_NAME: ai/issue-${{ github.event.issue.number || github.run_id }}
  ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
  GH_REPO: ${{ github.repository }}

jobs:
  # ===========================================================================
  # On Issue Created: Add to Project Board as Todo
  # ===========================================================================
  add-to-project:
    name: "📋 Add Issue to Project Board (Todo)"
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: "📌 Add to Project Board (Todo)"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"

          PROJECT_DATA=$(gh api graphql -f query='
            query {
              user(login: "joseguerracajas") {
                projectV2(number: 1) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ')

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id')
          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].id')
          TODO_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].options[] | select(.name == "Todo") | .id')

          ITEM_DATA=$(gh api graphql -f query="mutation { addProjectV2ItemById(input: {projectId: \"$PROJECT_ID\", contentId: \"$ISSUE_NODE_ID\"}) { item { id } } }")
          ITEM_ID=$(echo "$ITEM_DATA" | jq -r '.data.addProjectV2ItemById.item.id')

          gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: { projectId: \"$PROJECT_ID\" itemId: \"$ITEM_ID\" fieldId: \"$STATUS_FIELD_ID\" value: { singleSelectOptionId: \"$TODO_ID\" } }) { projectV2Item { id } } }"

          echo "✅ Issue #${{ github.event.issue.number }} added to Project Board as Todo"

  # ===========================================================================
  # Stage 1: Product Manager Agent — LLM generates User Stories
  # ===========================================================================
  product-manager:
    name: "🔵 Product Manager Agent"
    if: |
      (github.event_name == 'issues' &&
        (github.event.action == 'labeled' || github.event.action == 'opened') &&
        contains(github.event.issue.labels.*.name, 'ai-pipeline')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🌿 Create feature branch"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ${{ env.BRANCH_NAME }} 2>/dev/null || git checkout ${{ env.BRANCH_NAME }}
          git push -u origin ${{ env.BRANCH_NAME }} 2>/dev/null || true

      - name: "📌 Add to Project Board (Todo)"
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          PROJECT_DATA=$(gh api graphql -f query='
            query {
              user(login: "joseguerracajas") {
                projectV2(number: 1) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ')
          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id')
          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].id')
          TODO_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].options[] | select(.name == "Todo") | .id')
          ITEM_DATA=$(gh api graphql -f query="mutation { addProjectV2ItemById(input: {projectId: \"$PROJECT_ID\", contentId: \"$ISSUE_NODE_ID\"}) { item { id } } }")
          ITEM_ID=$(echo "$ITEM_DATA" | jq -r '.data.addProjectV2ItemById.item.id')
          gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: { projectId: \"$PROJECT_ID\" itemId: \"$ITEM_ID\" fieldId: \"$STATUS_FIELD_ID\" value: { singleSelectOptionId: \"$TODO_ID\" } }) { projectV2Item { id } } }"
          echo "✅ Issue #${{ github.event.issue.number }} set to Todo on Project Board"

      - name: "🔵 Generate User Stories with LLM"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FEATURE_INPUT="${{ github.event.issue.body || inputs.feature_description }}"

          README=$(cat README.md | head -c 8000)
          AGENT_PROMPT=$(cat .github/agents/product-manager.md)

          FEEDBACK=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            FEEDBACK=$(gh issue view "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --json comments \
              --jq '[.comments[] | select(.body | startswith("/feedback:")) | .body | ltrimstr("/feedback:")] | last // ""' 2>/dev/null || echo "")
          fi

          USER_MSG="## Feature Request\n\n${FEATURE_INPUT}"
          [ -n "$FEEDBACK" ] && USER_MSG="${USER_MSG}\n\n## Orchestrator Feedback\n\n${FEEDBACK}"
          USER_MSG="${USER_MSG}\n\n## Project Context (README)\n\n${README}"

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg system "$AGENT_PROMPT" \
              --arg user "$USER_MSG" \
              '{model:"gpt-4o",messages:[{role:"system",content:$system},{role:"user",content:$user}],max_tokens:4000,temperature:0.3}'
            )")

          HU=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "ERROR: No response from LLM"')

          mkdir -p docs/ai-output
          echo "$HU" > docs/ai-output/user-stories.md
          git add docs/ai-output/user-stories.md
          git commit -m "docs: [PM Agent] user stories for issue #${{ env.ISSUE_NUMBER }} [skip ci]"
          git push origin ${{ env.BRANCH_NAME }}

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## 🔵 Product Manager Agent — User Stories\n\n%s\n\n---\n> **To provide feedback before approving**, comment: `/feedback: your notes here`\n> The next agent will incorporate your feedback.\n' "$HU" > /tmp/pm-comment.md
            gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/pm-comment.md
          fi

      - name: "💬 Comment pipeline started"
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## 🤖 AI Pipeline Started\n\n| Stage | Status |\n|-------|--------|\n| 🔵 Product Manager | ✅ Done — review above |\n| 🟢 Backend Developer | ⏸️ Awaiting your approval |\n| 🟡 Frontend Developer | ⏸️ Awaiting approval |\n| 🔴 DevOps | ⏸️ Pending |\n| 🟣 QA Engineer | ⏸️ Pending |\n\n> Pipeline started by: @%s\n> Feature branch: `%s`\n' "${{ github.actor }}" "${{ env.BRANCH_NAME }}" > /tmp/pipeline-started.md
          gh issue comment ${{ env.ISSUE_NUMBER }} \
            --repo ${{ env.GH_REPO }} \
            --body-file /tmp/pipeline-started.md

  # ===========================================================================
  # Stage 2: Approval Gate — User Stories
  # ===========================================================================
  approve-stories:
    name: "🟣 Orchestrator: Approve Stories"
    needs: product-manager
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for approval on User Stories..."
        run: |
          echo "## 🟣 Approval Required — User Stories" >> $GITHUB_STEP_SUMMARY
          echo "Review the User Stories posted as an issue comment." >> $GITHUB_STEP_SUMMARY
          echo "To add feedback before approving, comment \`/feedback: ...\` on the issue." >> $GITHUB_STEP_SUMMARY

      - name: "📌 Move to In Progress on Project Board"
        if: env.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          PROJECT_DATA=$(gh api graphql -f query='
            query {
              user(login: "joseguerracajas") {
                projectV2(number: 1) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                  items(first: 100) {
                    nodes {
                      id
                      content { ... on Issue { id } }
                    }
                  }
                }
              }
            }
          ')
          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id')
          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].id')
          IN_PROGRESS_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].options[] | select(.name == "In Progress") | .id')
          ITEM_ID=$(echo "$PROJECT_DATA" | jq -r --arg ISSUE_ID "$ISSUE_NODE_ID" '.data.user.projectV2.items.nodes[] | select(.content.id == $ISSUE_ID) | .id')
          gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: { projectId: \"$PROJECT_ID\" itemId: \"$ITEM_ID\" fieldId: \"$STATUS_FIELD_ID\" value: { singleSelectOptionId: \"$IN_PROGRESS_ID\" } }) { projectV2Item { id } } }"
          echo "✅ Issue #${{ env.ISSUE_NUMBER }} moved to In Progress after stories approved"

  # ===========================================================================
  # Stage 3: Backend Developer Agent — LLM generates Supabase changes
  # ===========================================================================
  backend-developer:
    name: "🟢 Backend Developer Agent"
    needs: approve-stories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.BRANCH_NAME }}

      - name: "🟢 Generate Supabase Changes with LLM"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          README=$(cat README.md | head -c 6000)
          AGENT_PROMPT=$(cat .github/agents/backend-developer.md)
          HU=$(cat docs/ai-output/user-stories.md 2>/dev/null || echo "No user stories found")
          MIGRATIONS=$(find supabase/migrations -name "*.sql" 2>/dev/null | sort | tail -5 | \
            xargs -I{} sh -c 'echo "### {}"; cat "{}"; echo ""' 2>/dev/null | head -c 3000 || echo "No existing migrations")

          FEEDBACK=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            FEEDBACK=$(gh issue view "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --json comments \
              --jq '[.comments[] | select(.body | startswith("/feedback:")) | .body | ltrimstr("/feedback:")] | last // ""' 2>/dev/null || echo "")
          fi

          USER_MSG="## Approved User Stories\n\n${HU}"
          [ -n "$FEEDBACK" ] && USER_MSG="${USER_MSG}\n\n## Orchestrator Feedback\n\n${FEEDBACK}"
          USER_MSG="${USER_MSG}\n\n## Existing Migrations (for context)\n\n${MIGRATIONS}"
          USER_MSG="${USER_MSG}\n\n## Project Context (README)\n\n${README}"
          USER_MSG="${USER_MSG}\n\n---\nIMPORTANT: Respond ONLY with valid JSON (no markdown, no extra text):\n{\"needs_migration\": true, \"files\": [{\"path\": \"supabase/migrations/YYYYMMDDHHMMSS_description.sql\", \"content\": \"-- SQL content here\"}], \"summary\": \"Brief description of what was generated\"}\nIf no changes needed, set needs_migration to false and files to []."

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg system "$AGENT_PROMPT" \
              --arg user "$USER_MSG" \
              '{model:"gpt-4o",messages:[{role:"system",content:$system},{role:"user",content:$user}],max_tokens:4000,temperature:0.2}'
            )")

          LLM_OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "{}"')
          LLM_JSON=$(echo "$LLM_OUTPUT" | python3 -c "$(cat <<'PYEOF'
          import sys, json, re
          text = sys.stdin.read()
          match = re.search(r'\{.*\}', text, re.DOTALL)
          if match:
              print(match.group())
          else:
              print('{"needs_migration": false, "files": [], "summary": "Could not parse LLM output"}')
          PYEOF
          )")

          echo "$LLM_JSON" > docs/ai-output/backend-output.json

          NEEDS_MIGRATION=$(echo "$LLM_JSON" | jq -r '.needs_migration // false')
          SUMMARY=$(echo "$LLM_JSON" | jq -r '.summary // "No changes needed"')

          if [ "$NEEDS_MIGRATION" = "true" ]; then
            cat > /tmp/create_backend_files.py << 'PYEOF'
          import json, os, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              path = f['path']
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as fp:
                  fp.write(f['content'])
              print(f'Created: {path}')
          PYEOF
            echo "$LLM_JSON" | python3 /tmp/create_backend_files.py
            git add -A
            git commit -m "feat: [Backend Agent] Supabase migrations for issue #${{ env.ISSUE_NUMBER }} [skip ci]"
            git push origin ${{ env.BRANCH_NAME }}
          fi

          FILES_LIST=$(echo "$LLM_JSON" | jq -r '[.files[].path] | if length > 0 then "- " + join("\n- ") else "None" end' 2>/dev/null || echo "None")

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## 🟢 Backend Developer Agent — Supabase Changes\n\n**Summary:** %s\n**Needs migration:** %s\n\n**Files generated:**\n%s\n\n---\n> **To provide feedback before approving**, comment: `/feedback: your notes here`\n' "$SUMMARY" "$NEEDS_MIGRATION" "$FILES_LIST" > /tmp/backend-comment.md
            gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/backend-comment.md
          fi

  # ===========================================================================
  # Stage 4: Approval Gate — Backend
  # ===========================================================================
  approve-backend:
    name: "🟣 Orchestrator: Approve Backend"
    needs: backend-developer
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for approval on Backend changes..."
        run: |
          echo "## 🟣 Approval Required — Backend Changes" >> $GITHUB_STEP_SUMMARY
          echo "Review the Supabase migrations posted as an issue comment." >> $GITHUB_STEP_SUMMARY
          echo "To add feedback before approving, comment \`/feedback: ...\` on the issue." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 5: Frontend Developer Agent — LLM generates Flutter code
  # ===========================================================================
  frontend-developer:
    name: "🟡 Frontend Developer Agent"
    needs: approve-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.BRANCH_NAME }}

      - name: "🟡 Generate Flutter Code with LLM"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          README=$(cat README.md | head -c 6000)
          AGENT_PROMPT=$(cat .github/agents/frontend-developer.md)
          HU=$(cat docs/ai-output/user-stories.md 2>/dev/null || echo "")
          BACKEND_SUMMARY=$(cat docs/ai-output/backend-output.json 2>/dev/null | jq -r '.summary // "No backend changes"')

          EXISTING_FEATURE=$(find lib/features -name "*.dart" 2>/dev/null | head -8 | \
            xargs -I{} sh -c 'echo "### {}"; head -40 "{}"; echo ""' 2>/dev/null | head -c 4000 || echo "No existing features")

          FEEDBACK=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            FEEDBACK=$(gh issue view "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --json comments \
              --jq '[.comments[] | select(.body | startswith("/feedback:")) | .body | ltrimstr("/feedback:")] | last // ""' 2>/dev/null || echo "")
          fi

          USER_MSG="## Approved User Stories\n\n${HU}"
          USER_MSG="${USER_MSG}\n\n## Backend Changes Summary\n\n${BACKEND_SUMMARY}"
          [ -n "$FEEDBACK" ] && USER_MSG="${USER_MSG}\n\n## Orchestrator Feedback\n\n${FEEDBACK}"
          USER_MSG="${USER_MSG}\n\n## Existing Feature Structure (for reference)\n\n${EXISTING_FEATURE}"
          USER_MSG="${USER_MSG}\n\n## Project Context (README)\n\n${README}"
          USER_MSG="${USER_MSG}\n\n---\nIMPORTANT: Respond ONLY with valid JSON (no markdown, no extra text):\n{\"files\": [{\"path\": \"lib/features/feature_name/data/models/my_model.dart\", \"content\": \"// Complete Dart file content here\"}], \"summary\": \"Brief description of all generated files\"}\nArchitecture rules:\n- Feature-based: lib/features/{name}/data/, domain/, presentation/\n- Use Brick for offline-first models\n- Use Riverpod for state management\n- Follow the patterns from existing features shown above"

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg system "$AGENT_PROMPT" \
              --arg user "$USER_MSG" \
              '{model:"gpt-4o",messages:[{role:"system",content:$system},{role:"user",content:$user}],max_tokens:8000,temperature:0.2}'
            )")

          LLM_OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "{}"')
          LLM_JSON=$(echo "$LLM_OUTPUT" | python3 -c "$(cat <<'PYEOF'
          import sys, json, re
          text = sys.stdin.read()
          match = re.search(r'\{.*\}', text, re.DOTALL)
          if match:
              print(match.group())
          else:
              print('{"files": [], "summary": "Could not parse LLM output"}')
          PYEOF
          )")

          echo "$LLM_JSON" > docs/ai-output/frontend-output.json

          cat > /tmp/create_frontend_files.py << 'PYEOF'
          import json, os, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              path = f['path']
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as fp:
                  fp.write(f['content'])
              print(f'Created: {path}')
          PYEOF
          echo "$LLM_JSON" | python3 /tmp/create_frontend_files.py

          SUMMARY=$(echo "$LLM_JSON" | jq -r '.summary // "No summary"')
          FILES_LIST=$(echo "$LLM_JSON" | jq -r '[.files[].path] | if length > 0 then "- " + join("\n- ") else "None" end' 2>/dev/null || echo "None")

          git add -A
          git commit -m "feat: [Frontend Agent] Flutter code for issue #${{ env.ISSUE_NUMBER }} [skip ci]"
          git push origin ${{ env.BRANCH_NAME }}

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## 🟡 Frontend Developer Agent — Flutter Code\n\n**Summary:** %s\n\n**Files generated:**\n%s\n\n---\n> **To provide feedback before approving**, comment: `/feedback: your notes here`\n' "$SUMMARY" "$FILES_LIST" > /tmp/frontend-comment.md
            gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/frontend-comment.md
          fi

  # ===========================================================================
  # Stage 6: Approval Gate — Frontend
  # ===========================================================================
  approve-frontend:
    name: "🟣 Orchestrator: Approve Frontend"
    needs: frontend-developer
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for approval on Flutter code..."
        run: |
          echo "## 🟣 Approval Required — Flutter Code" >> $GITHUB_STEP_SUMMARY
          echo "Review the Flutter code posted as an issue comment." >> $GITHUB_STEP_SUMMARY
          echo "To add feedback before approving, comment \`/feedback: ...\` on the issue." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 7: DevOps Agent — verify CI/CD
  # ===========================================================================
  devops-engineer:
    name: "🔴 DevOps Engineer Agent"
    needs: approve-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: "🚀 Verify CI/CD configuration"
        run: |
          echo "## 🔴 DevOps Agent" >> $GITHUB_STEP_SUMMARY
          echo "✅ CI/CD workflows verified" >> $GITHUB_STEP_SUMMARY
          echo "✅ Feature branch ready for QA" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 8: QA Agent — Real Flutter analyze + tests
  # ===========================================================================
  qa-engineer:
    name: "🟣 QA Engineer Agent"
    needs: devops-engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.3"
          channel: "stable"
          cache: true

      - name: "📦 Install dependencies"
        run: flutter pub get

      - name: "🔎 Flutter Analyze"
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze-output.txt
        continue-on-error: true

      - name: "🧪 Run Tests"
        run: flutter test --coverage 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: "📊 Post QA Results to Issue"
        if: env.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ANALYZE=$(cat /tmp/analyze-output.txt | tail -8)
          TESTS=$(cat /tmp/test-output.txt | tail -10)

          printf '## 🟣 QA Engineer Agent — Results\n\n```\nFlutter Analyze:\n%s\n\nTests:\n%s\n```\n' "$ANALYZE" "$TESTS" > /tmp/qa-comment.md
          gh issue comment "${{ env.ISSUE_NUMBER }}" \
            --repo ${{ env.GH_REPO }} \
            --body-file /tmp/qa-comment.md

  # ===========================================================================
  # Stage 9: Quality Gate — Create PR for review
  # ===========================================================================
  quality-gate:
    name: "🏁 Quality Gate — Create PR"
    needs: qa-engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.BRANCH_NAME }}

      - name: "🔀 Create Pull Request"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HU=$(cat docs/ai-output/user-stories.md 2>/dev/null | head -60 || echo "See issue for details")
          ISSUE_REF="${{ env.ISSUE_NUMBER != '' && format('Closes #{0}', env.ISSUE_NUMBER) || '' }}"

          printf '## 🤖 AI-Generated Feature\n\n%s\n\n## User Stories\n%s\n\n## What was generated\n- ✅ User Stories (PM Agent)\n- ✅ Supabase Migrations (Backend Agent)\n- ✅ Flutter Code — Brick, Riverpod, UI (Frontend Agent)\n- ✅ QA — Flutter analyze + tests\n\n---\n> This PR was generated by the AI Multi-Agent Pipeline.\n> Please review all files carefully before merging.\n' "$ISSUE_REF" "$HU" > /tmp/pr-body.md
          PR_URL=$(gh pr create \
            --title "feat: [AI Agent] feature for issue #${{ env.ISSUE_NUMBER }}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head ${{ env.BRANCH_NAME }} \
            --label "ai-generated" 2>&1 || echo "PR may already exist")

          echo "🔀 PR: $PR_URL" >> $GITHUB_STEP_SUMMARY

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## ✅ AI Pipeline Completed\n\n| Stage | Status |\n|-------|--------|\n| 🔵 Product Manager | ✅ Done |\n| 🟢 Backend Developer | ✅ Done |\n| 🟡 Frontend Developer | ✅ Done |\n| 🔴 DevOps | ✅ Done |\n| 🟣 QA Engineer | ✅ Done |\n\n🔀 **Pull Request created:** %s\n\nPlease review and approve the PR to trigger deployment.\nIssue will move to **Done** after successful deploy to stores.\n' "$PR_URL" > /tmp/completed-comment.md
            gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/completed-comment.md
          fi
