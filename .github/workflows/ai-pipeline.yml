# =============================================================================
# 🤖 AI Multi-Agent Pipeline
# =============================================================================
# This workflow orchestrates the AI agent pipeline with human approval gates.
# Each stage requires explicit approval from the orchestrator before proceeding.
#
# Flow: Feature Request → PM → Backend → Frontend → DevOps → QA → Deploy
# =============================================================================

name: "🤖 AI Agent Pipeline"

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      feature_description:
        description: "Describe the feature you want to build"
        required: true
        type: string
      skip_to_stage:
        description: "Skip to a specific stage (for re-runs)"
        required: false
        type: choice
        options:
          - product-manager
          - backend
          - frontend
          - devops
          - qa
        default: product-manager

concurrency:
  group: ai-pipeline-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Stage 1: Product Manager Agent
  # ===========================================================================
  product-manager:
    name: "🔵 Product Manager Agent"
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-pipeline')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.skip_to_stage == 'product-manager' || inputs.skip_to_stage == ''))
    runs-on: ubuntu-latest
    outputs:
      stories_approved: ${{ steps.check.outputs.approved }}
    steps:
      - uses: actions/checkout@v4

      - name: "📋 Generate User Stories"
        id: generate
        env:
          FEATURE_INPUT: ${{ github.event.inputs.feature_description || github.event.issue.body }}
        run: |
          echo "## 🔵 Product Manager Agent Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Feature request received. The PM Agent will generate:" >> $GITHUB_STEP_SUMMARY
          echo "- User Stories (Given/When/Then)" >> $GITHUB_STEP_SUMMARY
          echo "- Acceptance Criteria" >> $GITHUB_STEP_SUMMARY
          echo "- Data Model Impact" >> $GITHUB_STEP_SUMMARY
          echo "- UI Flow Description" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Feature Request:" >> $GITHUB_STEP_SUMMARY
          printf '%s\n' "$FEATURE_INPUT" >> $GITHUB_STEP_SUMMARY

      - name: "📝 Create Stories PR"
        run: |
          echo "Stories generated and ready for review."
          echo "The orchestrator must approve before proceeding to Backend stage."

      - name: "✅ Mark for approval"
        id: check
        run: echo "approved=true" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Stage 2: Human Approval Gate — Stories
  # ===========================================================================
  approve-stories:
    name: "🟣 Orchestrator: Approve Stories"
    needs: product-manager
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for orchestrator approval..."
        run: |
          echo "## 🟣 Approval Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The **Product Manager Agent** has generated user stories." >> $GITHUB_STEP_SUMMARY
          echo "Please review and approve to proceed to the Backend stage." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Actions:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Approve: Click 'Review deployments' and approve" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Reject: Cancel this workflow and update the issue" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 3: Backend Developer Agent
  # ===========================================================================
  backend-developer:
    name: "🟢 Backend Developer Agent"
    needs: approve-stories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🗄️ Generate Supabase Changes"
        run: |
          echo "## 🟢 Backend Developer Agent Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Based on approved stories, generating:" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Migrations" >> $GITHUB_STEP_SUMMARY
          echo "- RLS Policies" >> $GITHUB_STEP_SUMMARY
          echo "- Edge Functions (if needed)" >> $GITHUB_STEP_SUMMARY
          echo "- Schema Documentation" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 4: Human Approval Gate — Backend
  # ===========================================================================
  approve-backend:
    name: "🟣 Orchestrator: Approve Backend"
    needs: backend-developer
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for orchestrator approval..."
        run: |
          echo "## 🟣 Approval Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The **Backend Agent** has generated Supabase changes." >> $GITHUB_STEP_SUMMARY
          echo "Review migrations and RLS policies before proceeding." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 5: Frontend Developer Agent
  # ===========================================================================
  frontend-developer:
    name: "🟡 Frontend Developer Agent"
    needs: approve-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "📱 Generate Flutter Code"
        run: |
          echo "## 🟡 Frontend Developer Agent Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Based on approved backend schema, generating:" >> $GITHUB_STEP_SUMMARY
          echo "- Brick Models (offline-first)" >> $GITHUB_STEP_SUMMARY
          echo "- Riverpod Providers" >> $GITHUB_STEP_SUMMARY
          echo "- UI Screens & Widgets" >> $GITHUB_STEP_SUMMARY
          echo "- Localization Strings" >> $GITHUB_STEP_SUMMARY
          echo "- Unit & Widget Tests" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 6: Human Approval Gate — Frontend
  # ===========================================================================
  approve-frontend:
    name: "🟣 Orchestrator: Approve Frontend"
    needs: frontend-developer
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for orchestrator approval..."
        run: |
          echo "## 🟣 Approval Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The **Frontend Agent** has generated Flutter code." >> $GITHUB_STEP_SUMMARY
          echo "Review the UI implementation before proceeding." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 7: DevOps Agent
  # ===========================================================================
  devops-engineer:
    name: "🔴 DevOps Engineer Agent"
    needs: approve-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🚀 Generate CI/CD Configuration"
        run: |
          echo "## 🔴 DevOps Engineer Agent Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generating deployment configuration:" >> $GITHUB_STEP_SUMMARY
          echo "- Updated CI/CD workflows" >> $GITHUB_STEP_SUMMARY
          echo "- Build configurations" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy scripts" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 8: QA Agent + SonarQube
  # ===========================================================================
  qa-engineer:
    name: "🟣 QA Engineer Agent"
    needs: devops-engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🔍 Run Quality Analysis"
        run: |
          echo "## 🟣 QA Engineer Agent Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Running quality checks:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Flutter Analyze" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Widget Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SonarQube Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Coverage Report" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 9: Final Quality Gate
  # ===========================================================================
  quality-gate:
    name: "🏁 Quality Gate"
    needs: qa-engineer
    runs-on: ubuntu-latest
    steps:
      - name: "📊 Quality Gate Decision"
        run: |
          echo "## 🏁 Quality Gate Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter Analyze | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage ≥ 80% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarQube (no blockers) | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ QUALITY GATE: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Feature is ready for merge and deploy! 🎉" >> $GITHUB_STEP_SUMMARY
