# =============================================================================
# 🤖 AI Multi-Agent Pipeline — LLM Powered
# =============================================================================
# Each agent calls GitHub Models API (gpt-4o) to generate real artifacts.
# Context: README.md (project structure) + .github/agents/*.md (system prompts)
# Feedback loop: comment "/feedback: <text>" on the issue before each approval.
# Generated code is committed to a feature branch; PR is created after QA.
#
# Flow: Issue ➔ PM (HU) ➔ Backend (Migrations) ➔ Frontend (Code) ➔ QA ➔ PR ➔ Deploy ➔ Done
# =============================================================================

name: "🤖 AI Agent Pipeline"


on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      feature_description:
        description: "Describe the feature you want to build"
        required: true
        type: string
  # The pipeline is only triggered by the ai-pipeline label

# Only cancel previous runs when an explicit feedback command is posted (bot comments do not cancel)
concurrency:
  group: ai-pipeline-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: >-
    ${{ github.event_name == 'issue_comment' &&
        github.event.sender.type != 'Bot' &&
        (startsWith(github.event.comment.body, '/feedback:') ||
         startsWith(github.event.comment.body, '/feedback-backend:') ||
         startsWith(github.event.comment.body, '/feedback-frontend:')) }}

permissions:
  issues: write
  contents: write
  pull-requests: write
  repository-projects: write
  models: read

env:
  BRANCH_NAME: ai/issue-${{ (github.event.issue != null && github.event.issue.number) || github.run_id }}
  ISSUE_NUMBER: ${{ (github.event.issue != null && github.event.issue.number) || '' }}
  GH_REPO: ${{ github.repository }}
  USE_GEMINI: ${{ vars.USE_GEMINI || 'false' }}

jobs:
  # ===========================================================================
  # On Issue Created: Add to Project Board as Todo
  # ===========================================================================
  add-to-project:
    name: "📋 Add Issue to Project Board (Todo)"
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: "📌 Add to Project Board (Todo)"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
        run: |
          set -e
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          if [ -z "$ISSUE_NODE_ID" ]; then
            echo "::warning::No issue node id available; skipping project board update."
            exit 0
          fi

          PROJECT_DATA=$(gh api graphql -f query='
            query {
              user(login: "joseguerracajas") {
                projectV2(number: 1) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ')
          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id // empty')
          if [ -z "$PROJECT_ID" ]; then
            echo "::warning::Project not found (check PROJECT_TOKEN scopes: read:project, project, repo)."
            exit 0
          fi

          ADD_RESULT=$(gh api graphql -f query="mutation { addProjectV2ItemById(input: { projectId: \"$PROJECT_ID\" contentId: \"$ISSUE_NODE_ID\" }) { item { id } } }")
          ITEM_ID=$(echo "$ADD_RESULT" | jq -r '.data.addProjectV2ItemById.item.id // empty')
          if [ -z "$ITEM_ID" ]; then
            echo "::warning::Could not add issue to project: $ADD_RESULT"
            exit 0
          fi

          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].id')
          TODO_OPTION_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].options[] | select(.name == "Todo") | .id')
          if [ -n "$STATUS_FIELD_ID" ] && [ -n "$TODO_OPTION_ID" ]; then
            gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: { projectId: \"$PROJECT_ID\" itemId: \"$ITEM_ID\" fieldId: \"$STATUS_FIELD_ID\" value: { singleSelectOptionId: \"$TODO_OPTION_ID\" } }) { projectV2Item { id } } }" >/dev/null
            echo "✅ Issue #${{ github.event.issue.number }} added to project as Todo"
          else
            echo "✅ Issue added to project (Status field/Todo option not found, left at default)"
          fi

  product-manager:
    name: "🔵 Product Manager Agent"
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ai-pipeline') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'ai-pipeline')) ||
      (github.event_name == 'issue_comment' && github.event.sender.type != 'Bot' && startsWith(github.event.comment.body, '/feedback:') && !startsWith(github.event.comment.body, '/feedback-backend:') && !startsWith(github.event.comment.body, '/feedback-frontend:'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: "🌿 Ensure feature branch exists"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ env.BRANCH_NAME }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on origin — checking it out."
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "Branch $BRANCH does not exist — creating from current HEAD (main)."
            git checkout -B "$BRANCH"
            git push -u origin "$BRANCH"
          fi

      - name: "🟡 Generate User Stories (Gemini or GitHub Models)"
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # --- Build context ---------------------------------------------------
          README=$(head -c 8000 README.md 2>/dev/null || echo "")
          AGENT_PROMPT=$(cat .github/agents/product-manager.md 2>/dev/null || echo "You are a Product Manager. Write user stories in Spanish.")
          ARB_CONTEXT=$(find lib/l10n -name "*.arb" 2>/dev/null | sort | \
            xargs -I{} sh -c 'echo "=== {} ==="; cat "{}"; echo ""' 2>/dev/null | head -c 2000 || echo "No ARB files")
          BRANCH_URL="https://github.com/${{ env.GH_REPO }}/tree/${{ env.BRANCH_NAME }}"

          ISSUE_TITLE=""
          ISSUE_BODY=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            ISSUE_TITLE=$(gh issue view "${{ env.ISSUE_NUMBER }}" --repo ${{ env.GH_REPO }} --json title --jq '.title' 2>/dev/null || echo "")
            ISSUE_BODY=$(gh issue view "${{ env.ISSUE_NUMBER }}" --repo ${{ env.GH_REPO }} --json body --jq '.body' 2>/dev/null || echo "")
          fi
          FEATURE_INPUT="${{ github.event.inputs.feature_description }}"

          FEEDBACK=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            FEEDBACK=$(gh issue view "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --json comments \
              --jq '[.comments[] | select(.body | startswith("/feedback:")) | .body | ltrimstr("/feedback:")] | last // ""' 2>/dev/null || echo "")
          fi

          USER_MSG="## Feature Request"
          if [ -n "$ISSUE_TITLE" ]; then
            USER_MSG="${USER_MSG}\n\n**Issue:** ${ISSUE_TITLE}\n\n${ISSUE_BODY}"
          fi
          if [ -n "$FEATURE_INPUT" ]; then
            USER_MSG="${USER_MSG}\n\n**Manual input:** ${FEATURE_INPUT}"
          fi
          if [ -n "$FEEDBACK" ]; then
            USER_MSG="${USER_MSG}\n\n## Orchestrator Feedback — rewrite incorporating this:\n${FEEDBACK}"
          fi
          USER_MSG="${USER_MSG}\n\n## Localization context (ARB files)\n${ARB_CONTEXT}"
          USER_MSG="${USER_MSG}\n\n## Project Context (README)\n${README}"
          USER_MSG="${USER_MSG}\n\n---\nRespond in Spanish with the User Stories in Markdown format."

          # --- Call LLM --------------------------------------------------------
          HU=""
          if [ "${{ env.USE_GEMINI }}" = "true" ]; then
            echo "🤖 Using Gemini 2.5 Flash (Google AI Studio)"
            if [ -z "$GEMINI_API_KEY" ]; then
              echo "::error::GEMINI_API_KEY secret is not set."
              exit 1
            fi
            COMBINED_PROMPT="${AGENT_PROMPT}\n\n${USER_MSG}"
            RESPONSE=$(curl -s -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg p "$COMBINED_PROMPT" '{contents:[{parts:[{text:$p}]}],generationConfig:{temperature:0.3,maxOutputTokens:4000}}')")

            if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
              echo "::error::Gemini API returned non-JSON."
              echo "$RESPONSE" | head -c 1000
              exit 1
            fi
            API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            if [ -n "$API_ERROR" ]; then
              echo "::error::Gemini API error: $API_ERROR"
              exit 1
            fi
            HU=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')
          else
            echo "🤖 Using GitHub Models (gpt-4o)"
            RESPONSE=$(curl -s -X POST \
              "https://models.inference.ai.azure.com/chat/completions" \
              -H "Authorization: Bearer $MODELS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg system "$AGENT_PROMPT" --arg user "$USER_MSG" \
                '{model:"gpt-4o",messages:[{role:"system",content:$system},{role:"user",content:$user}],max_tokens:4000,temperature:0.3}')")

            if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
              echo "::error::GitHub Models API returned non-JSON."
              echo "$RESPONSE" | head -c 1000
              exit 1
            fi
            API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            if [ -n "$API_ERROR" ]; then
              echo "::error::GitHub Models API error: $API_ERROR"
              exit 1
            fi
            HU=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // ""')
          fi

          if [ -z "$HU" ] || [ "$HU" = "null" ]; then
            echo "::error::LLM returned empty content."
            echo "$RESPONSE" | jq . | head -c 2000
            exit 1
          fi
          echo "✅ LLM responded ($(echo "$HU" | wc -c) chars)"

          # --- Commit user stories --------------------------------------------
          mkdir -p docs/ai-output
          printf '%s\n' "$HU" > docs/ai-output/user-stories.md
          git add docs/ai-output/user-stories.md
          git commit -m "docs: [PM Agent] user stories for issue #${{ env.ISSUE_NUMBER }} [skip ci]" || echo "No changes to commit"
          git push origin ${{ env.BRANCH_NAME }}

          # --- Post combined comment on issue ---------------------------------
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## 🔵 Product Manager Agent — User Stories\n\n%s\n\n---\n🌿 Branch: [%s](%s)\n\n**Feedback commands:**\n- `/feedback: text` — rewrite user stories from scratch (restarts full pipeline)\n- `/feedback-backend: text` — re-run only the Backend agent\n- `/feedback-frontend: text` — re-run only the Frontend agent\n\n---\n\n## 🤖 Pipeline Status\n\n| Stage | Status |\n|-------|--------|\n| 🔵 Product Manager | ✅ Done — review above |\n| 🟢 Backend Developer | ⏸️ Awaiting your approval |\n| 🟡 Frontend Developer | ⏸️ Awaiting approval |\n| 🔴 DevOps | ⏸️ Pending |\n| 🟣 QA Engineer | ⏸️ Pending |\n\n> Pipeline started by: @%s\n> Feature branch: `%s`\n' "$HU" "${{ env.BRANCH_NAME }}" "$BRANCH_URL" "${{ github.actor }}" "${{ env.BRANCH_NAME }}" > /tmp/pm-comment.md
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/pm-comment.md
          fi

  # ===========================================================================
  # Stage 2: Approval Gate — User Stories
  # ===========================================================================
  approve-stories:
    name: "🟣 Orchestrator: Approve Stories"
    needs: product-manager
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for approval on User Stories..."
        run: |
          echo "## 🟣 Approval Required — User Stories" >> $GITHUB_STEP_SUMMARY
          echo "Review the User Stories posted as an issue comment." >> $GITHUB_STEP_SUMMARY
          echo "To add feedback before approving, comment \`/feedback: ...\` on the issue." >> $GITHUB_STEP_SUMMARY

      - name: "📌 Move to In Progress on Project Board"
        if: env.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
        run: |
          ISSUE_NODE_ID="${{ (github.event.issue != null && github.event.issue.node_id) || '' }}"
          PROJECT_DATA=$(gh api graphql -f query='
            query {
              user(login: "joseguerracajas") {
                projectV2(number: 1) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                  items(first: 100) {
                    nodes {
                      id
                      content { ... on Issue { id } }
                    }
                  }
                }
              }
            }
          ')
          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id')
          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].id')
          IN_PROGRESS_ID=$(echo "$PROJECT_DATA" | jq -r '[.data.user.projectV2.fields.nodes[] | select(.name == "Status")] | .[0].options[] | select(.name == "In Progress") | .id')
          ITEM_ID=$(echo "$PROJECT_DATA" | jq -r --arg ISSUE_ID "$ISSUE_NODE_ID" '.data.user.projectV2.items.nodes[] | select(.content.id == $ISSUE_ID) | .id')
          gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: { projectId: \"$PROJECT_ID\" itemId: \"$ITEM_ID\" fieldId: \"$STATUS_FIELD_ID\" value: { singleSelectOptionId: \"$IN_PROGRESS_ID\" } }) { projectV2Item { id } } }"
          echo "✅ Issue #${{ env.ISSUE_NUMBER }} moved to In Progress after stories approved"

  # ===========================================================================
  # Stage 3: Backend Developer Agent — LLM generates Supabase changes
  # ===========================================================================
  backend-developer:
    name: "🟢 Backend Developer Agent"
    needs: approve-stories
    runs-on: ubuntu-latest
    if: |
      always() && (
        needs.approve-stories.result == 'success' ||
        (github.event_name == 'issue_comment' &&
          startsWith(github.event.comment != null && github.event.comment.body || '', '/feedback-backend:') &&
          github.event.issue != null &&
          contains(toJson(github.event.issue), 'ai-pipeline'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.BRANCH_NAME }}

      - name: "🟢 Generate Supabase Changes with LLM"
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          README=$(cat README.md | head -c 12000)
          AGENT_PROMPT=$(cat .github/agents/backend-developer.md)
          HU=$(cat docs/ai-output/user-stories.md 2>/dev/null || echo "No user stories found")
          MIGRATIONS=$(find supabase/migrations -name "*.sql" 2>/dev/null | sort | tail -5 | \
            xargs -I{} sh -c 'echo "### {}"; cat "{}"; echo ""' 2>/dev/null | head -c 3000 || echo "No existing migrations")
          ARB_CONTEXT=$(find lib/l10n -name "*.arb" 2>/dev/null | sort | \
            xargs -I{} sh -c 'echo "=== {} ==="; cat "{}"; echo ""' 2>/dev/null | head -c 2000 || echo "No ARB files")
          BRANCH_URL="https://github.com/${{ env.GH_REPO }}/tree/${{ env.BRANCH_NAME }}"

          FEEDBACK=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            FEEDBACK=$(gh issue view "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --json comments \
              --jq '[.comments[] | select(.body | (startswith("/feedback-backend:") or startswith("/feedback:"))) | .body | ltrimstr("/feedback-backend:") | ltrimstr("/feedback:")] | last // ""' 2>/dev/null || echo "")
          fi

          USER_MSG="## Approved User Stories\n\n${HU}"
          if [ -n "$FEEDBACK" ]; then
            USER_MSG="${USER_MSG}\n\n## Orchestrator Feedback — REWRITE your entire output incorporating this feedback\n\n${FEEDBACK}\n\n> Rewrite from scratch including the feedback above. Do not just append."
          fi
          USER_MSG="${USER_MSG}\n\n## Existing Migrations (for context)\n\n${MIGRATIONS}"
          USER_MSG="${USER_MSG}\n\n## Localization context (ARB files)\n\n${ARB_CONTEXT}"
          USER_MSG="${USER_MSG}\n\n## Project Context (README)\n\n${README}"
          USER_MSG="${USER_MSG}\n\n---\nIMPORTANT: Respond ONLY with valid JSON (no markdown, no extra text):\n{\"needs_migration\": true, \"files\": [{\"path\": \"supabase/migrations/YYYYMMDDHHMMSS_description.sql\", \"content\": \"-- SQL content here\"}], \"summary\": \"Brief description of what was generated\"}\nIf no changes needed, set needs_migration to false and files to []."

          if [ "${{ env.USE_GEMINI }}" = "true" ]; then
            echo "🤖 Backend using Gemini 2.5 Flash"
            COMBINED_PROMPT="${AGENT_PROMPT}\n\n${USER_MSG}"
            RESPONSE=$(curl -s -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg p "$COMBINED_PROMPT" '{contents:[{parts:[{text:$p}]}],generationConfig:{temperature:0.2,maxOutputTokens:32000,responseMimeType:"application/json",thinkingConfig:{thinkingBudget:0}}}')")
            FINISH=$(echo "$RESPONSE" | jq -r '.candidates[0].finishReason // ""')
            echo "Gemini finishReason: $FINISH"
            LLM_OUTPUT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "{}"')
          else
            echo "🤖 Backend using GitHub Models (gpt-4o)"
            RESPONSE=$(curl -s -X POST \
              "https://models.inference.ai.azure.com/chat/completions" \
              -H "Authorization: Bearer $MODELS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg system "$AGENT_PROMPT" --arg user "$USER_MSG" \
                '{model:"gpt-4o",messages:[{role:"system",content:$system},{role:"user",content:$user}],max_tokens:16000,temperature:0.2}')")
            LLM_OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "{}"')
          fi
          LLM_JSON=$(echo "$LLM_OUTPUT" | python3 -c "$(cat <<'PYEOF'
          import sys, json, re
          text = sys.stdin.read()
          match = re.search(r'\{.*\}', text, re.DOTALL)
          if match:
              print(match.group())
          else:
              print('{"needs_migration": false, "files": [], "summary": "Could not parse LLM output"}')
          PYEOF
          )")

          echo "$LLM_JSON" > docs/ai-output/backend-output.json

          NEEDS_MIGRATION=$(echo "$LLM_JSON" | jq -r '.needs_migration // false')
          SUMMARY=$(echo "$LLM_JSON" | jq -r '.summary // "No changes needed"')

          if [ "$NEEDS_MIGRATION" = "true" ]; then
            cat > /tmp/create_backend_files.py << 'PYEOF'
          import json, os, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              path = f['path']
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as fp:
                  fp.write(f['content'])
              print(f'Created: {path}')
          PYEOF
            echo "$LLM_JSON" | python3 /tmp/create_backend_files.py
            git add -A
            git commit -m "feat: [Backend Agent] Supabase migrations for issue #${{ env.ISSUE_NUMBER }} [skip ci]"
            git push origin ${{ env.BRANCH_NAME }}
          fi

          FILES_LIST=$(echo "$LLM_JSON" | jq -r '[.files[].path] | if length > 0 then "- " + join("\n- ") else "None" end' 2>/dev/null || echo "None")

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## 🟢 Backend Developer Agent — Supabase Changes\n\n**Summary:** %s\n**Needs migration:** %s\n\n**Files generated:**\n%s\n\n---\n🌿 Branch: [%s](%s)\n\n**Feedback:** `/feedback-backend: text` to rewrite only this stage.\n' "$SUMMARY" "$NEEDS_MIGRATION" "$FILES_LIST" "${{ env.BRANCH_NAME }}" "$BRANCH_URL" > /tmp/backend-comment.md
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/backend-comment.md
          fi

  # ===========================================================================
  # Stage 4: Approval Gate — Backend
  # ===========================================================================
  approve-backend:
    name: "🟣 Orchestrator: Approve Backend"
    needs: backend-developer
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for approval on Backend changes..."
        run: |
          echo "## 🟣 Approval Required — Backend Changes" >> $GITHUB_STEP_SUMMARY
          echo "Review the Supabase migrations posted as an issue comment." >> $GITHUB_STEP_SUMMARY
          echo "To add feedback before approving, comment \`/feedback: ...\` on the issue." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 5: Frontend Developer Agent — LLM generates Flutter code
  # ===========================================================================
  frontend-developer:
    name: "🟡 Frontend Developer Agent"
    needs: approve-backend
    runs-on: ubuntu-latest
    if: |
      always() && (
        needs.approve-backend.result == 'success' ||
        (github.event_name == 'issue_comment' &&
          github.event.sender.type != 'Bot' &&
          startsWith(github.event.comment != null && github.event.comment.body || '', '/feedback-frontend:') &&
          github.event.issue != null &&
          contains(toJson(github.event.issue), 'ai-pipeline'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.BRANCH_NAME }}

      - name: "🟡 Generate Flutter Code with LLM"
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -m pip install json-repair --quiet
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # TOKEN OPTIMIZATION: Reduce secondary context to leave room for the main file
          README=$(cat README.md)
          AGENT_PROMPT=$(cat .github/agents/frontend-developer.md)
          PUBSPEC=$(cat pubspec.yaml)
          HU=$(cat docs/ai-output/user-stories.md 2>/dev/null || echo "")
          BACKEND_CONTEXT=$(cat docs/ai-output/backend-output.json 2>/dev/null | jq -r \
            '"### Summary\n" + (.summary // "No changes") + "\n\n### Generated migrations\n" + ([.files[]? | "**" + .path + "**\n```sql\n" + .content + "\n```"] | join("\n\n"))' \
            2>/dev/null | head -c 1500 || echo "No backend changes")
          ARB_CONTEXT=$(find lib/l10n -name "*.arb" 2>/dev/null | sort | \
            xargs -I{} sh -c 'echo "=== {} ==="; cat "{}"; echo ""' 2>/dev/null | head -c 1500 || echo "No ARB files")
          BRANCH_URL="https://github.com/${{ env.GH_REPO }}/tree/${{ env.BRANCH_NAME }}"

          # ===================================================================
          # 🔍 CONTEXT INJECTION: Extract and inject existing code with fuzzy search
          # ===================================================================
          python3 -c "
          import re, os
          try:
              with open('docs/ai-output/user-stories.md', 'r') as f:
                  content = f.read()
              paths = re.findall(r'lib/[a-zA-Z0-9_\-/]+\.dart', content)
              paths = list(set(paths))
              context_data = ''
              for p in paths:
                  actual_path = p
                  if not os.path.exists(actual_path):
                      filename = os.path.basename(p)
                      for root, dirs, files in os.walk('.'):
                          if filename in files:
                              actual_path = os.path.join(root, filename)
                              break
                  
                  if os.path.exists(actual_path) and os.path.isfile(actual_path):
                      with open(actual_path, 'r') as src:
                          context_data += f'### Existing File Current Content ({actual_path}):\n\`\`\`dart\n{src.read()}\n\`\`\`\n\n'
                          print(f'✅ Context injected: {actual_path}')
              with open('/tmp/existing_code_context.txt', 'w') as out:
                  out.write(context_data if context_data else 'No existing files identified.')
          except Exception as e:
              with open('/tmp/existing_code_context.txt', 'w') as out:
                  out.write('Error gathering files context: ' + str(e))
          "
          EXISTING_CODE_CONTEXT=$(cat /tmp/existing_code_context.txt)
          # ===================================================================

          # Keep this small to avoid token overflow
          EXISTING_FEATURE=$(find lib/features -name "*.dart" 2>/dev/null | sort | head -5 | \
            xargs -I{} sh -c 'echo "=== FILE: {} ==="; cat "{}"; echo ""' 2>/dev/null | head -c 1500 || echo "No existing features")
          EXISTING_FILES_LIST=$(find lib/features -name "*.dart" 2>/dev/null | sort | head -20 | tr '\n' ',' || echo "none")

          FEEDBACK=""
          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            FEEDBACK=$(gh issue view "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --json comments \
              --jq '[.comments[] | select(.body | (startswith("/feedback-frontend:") or startswith("/feedback:"))) | .body | ltrimstr("/feedback-frontend:") | ltrimstr("/feedback:")] | last // ""' 2>/dev/null || echo "")
          fi

          # ===================================================================
          # 🚀 PROMPT CONSTRUCTION WITH ANTI-LAZINESS RULES
          # ===================================================================
          USER_MSG="## Approved User Stories\n\n${HU}"
          USER_MSG="${USER_MSG}\n\n## Backend Agent Output\n\n${BACKEND_CONTEXT}"
          if [ -n "$FEEDBACK" ]; then
            USER_MSG="${USER_MSG}\n\n## Orchestrator Feedback\n\n${FEEDBACK}\n\n> Rewrite incorporating feedback."
          fi
          USER_MSG="${USER_MSG}\n\n## pubspec.yaml (packages disponibles — SOLO usa estos)\n\n\`\`\`yaml\n${PUBSPEC}\n\`\`\`"
          USER_MSG="${USER_MSG}\n\n## Localization context (ARB files)\n\n${ARB_CONTEXT}"
          USER_MSG="${USER_MSG}\n\n## Existing Files to Modify (Real Current Code)\n\n${EXISTING_CODE_CONTEXT}"
          USER_MSG="${USER_MSG}\n\n## Existing Dart Files\n\n${EXISTING_FILES_LIST}"
          USER_MSG="${USER_MSG}\n\n## Structure patterns\n\n${EXISTING_FEATURE}"

          # CRITICAL: Remove the escape hatch of returning an empty files array
          USER_MSG="${USER_MSG}\n\n---\n⚡️ CRITICAL INSTRUCTIONS FOR THE FRONTEND AGENT:"
          USER_MSG="${USER_MSG}\n1. You MUST write and return the modified Dart code to fulfill the User Stories."
          USER_MSG="${USER_MSG}\n2. NEVER return an empty 'files' array. You must implement the views."
          USER_MSG="${USER_MSG}\n3. Return COMPLETE files — no '// rest of code' shortcuts (write from line 1 to the end)."
          USER_MSG="${USER_MSG}\n4. Respond ONLY with valid JSON using this exact structure:"
          USER_MSG="${USER_MSG}\n{\"files\": [{\"path\": \"path/to/file.dart\", \"content\": \"source code...\"}], \"summary\": \"What you did...\"}"

          # CRITICAL OPTIMIZATION: max_tokens leaves budget for the injection prompt
          if [ "${{ env.USE_GEMINI }}" = "true" ]; then
            echo "🤖 Frontend using Gemini 2.5 Flash"
            COMBINED_PROMPT="${AGENT_PROMPT}\n\n${USER_MSG}"
            RESPONSE=$(curl -s -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg p "$COMBINED_PROMPT" '{contents:[{parts:[{text:$p}]}],generationConfig:{temperature:0.2,maxOutputTokens:32000,responseMimeType:"application/json",thinkingConfig:{thinkingBudget:0}}}')")
            FINISH=$(echo "$RESPONSE" | jq -r '.candidates[0].finishReason // ""')
            USAGE=$(echo "$RESPONSE" | jq -c '.usageMetadata // {}')
            echo "Gemini finishReason: $FINISH"
            echo "Gemini usage: $USAGE"
            LLM_OUTPUT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // ""')
          else
            echo "🤖 Frontend using GitHub Models (gpt-4o)"
            RESPONSE=$(curl -s -X POST \
              "https://models.inference.ai.azure.com/chat/completions" \
              -H "Authorization: Bearer $MODELS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg system "$AGENT_PROMPT" --arg user "$USER_MSG" \
                '{model:"gpt-4o",messages:[{role:"system",content:$system},{role:"user",content:$user}],max_tokens:16000,temperature:0.2}')")
            LLM_OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // ""')
          fi

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            echo "::error::API did not return valid JSON. Raw response:"
            echo "$RESPONSE" | head -c 2000
            exit 1
          fi

          API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$API_ERROR" ]; then
            echo "::error::API Error: $API_ERROR"
            echo "Full response:"
            echo "$RESPONSE" | jq . | head -c 2000
            exit 1
          fi
          if [ -z "$LLM_OUTPUT" ] || [ "$LLM_OUTPUT" = "null" ]; then
            echo "::error::LLM returned empty output. Full response:"
            echo "$RESPONSE" | jq . | head -c 2000
            exit 1
          fi
          echo "✅ LLM output received ($(echo "$LLM_OUTPUT" | wc -c) chars)"
          echo "--- First 500 chars of LLM_OUTPUT ---"
          echo "$LLM_OUTPUT" | head -c 500
          echo ""
          echo "--- End preview ---"

          # Extract and validate JSON — use heredoc to avoid shell quoting issues
          cat > /tmp/extract_frontend_json.py << 'PYEOF'
          import sys, json, re
          try:
              from json_repair import repair_json
              HAS_REPAIR = True
          except ImportError:
              HAS_REPAIR = False

          text = sys.stdin.read()
          match = re.search(r'\{.*\}', text, re.DOTALL)
          if match:
              json_str = match.group()
              parsed = None
              try:
                  parsed = json.loads(json_str)
              except json.JSONDecodeError:
                  # Repair invalid escape sequences from Dart code (e.g. \' \$ \!)
                  # In JSON only \" \\ \/ \b \f \n \r \t \uXXXX are valid escapes
                  fixed = re.sub(r'\\([^"\\/bfnrtu])', lambda m: m.group(1), json_str)
                  try:
                      parsed = json.loads(fixed)
                  except json.JSONDecodeError as e:
                      print(json.dumps({'files': [], 'summary': 'ERROR JSON Parse: ' + str(e)}))
                      sys.exit(0)
              if 'files' not in parsed or not isinstance(parsed['files'], list):
                  parsed['files'] = []
              if not parsed['files']:
                  parsed['summary'] = 'ERROR: LLM refused to write code and returned empty files array.'
              print(json.dumps(parsed))
          else:
              print(json.dumps({'files': [], 'summary': 'ERROR: Regex did not find JSON in LLM output.'}))
          PYEOF
          LLM_JSON=$(echo "$LLM_OUTPUT" | python3 /tmp/extract_frontend_json.py)

          echo "$LLM_JSON" > docs/ai-output/frontend-output.json

          cat > /tmp/create_frontend_files.py << 'PYEOF'
          import json, os, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              path = f['path']
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as fp:
                  fp.write(f['content'])
              print(f'Created/Modified: {path}')
          PYEOF
          echo "$LLM_JSON" | python3 /tmp/create_frontend_files.py

          SUMMARY=$(echo "$LLM_JSON" | jq -r '.summary // "No summary"')
          FILES_LIST=$(echo "$LLM_JSON" | jq -r '[.files[].path] | if length > 0 then "- " + join("\n- ") else "None" end' 2>/dev/null || echo "None")

          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ Frontend Agent did not modify any files."
          else
            git commit -m "feat: [Frontend Agent] Flutter code for issue #${{ env.ISSUE_NUMBER }} [skip ci]"
            git push origin ${{ env.BRANCH_NAME }}
          fi

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## 🟡 Frontend Developer Agent — Flutter Code\n\n**Summary:** %s\n\n**Files generated / modified:**\n%s\n\n---\n> **To provide feedback before approving**, comment: `/feedback-frontend: your notes here`\n' "$SUMMARY" "$FILES_LIST" > /tmp/frontend-comment.md
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/frontend-comment.md
          fi

  # ===========================================================================
  # Stage 6: Approval Gate — Frontend
  # ===========================================================================
  approve-frontend:
    name: "🟣 Orchestrator: Approve Frontend"
    needs: frontend-developer
    runs-on: ubuntu-latest
    environment: orchestrator-approval
    steps:
      - name: "⏳ Waiting for approval on Flutter code..."
        run: |
          echo "## 🟣 Approval Required — Flutter Code" >> $GITHUB_STEP_SUMMARY
          echo "Review the Flutter code posted as an issue comment." >> $GITHUB_STEP_SUMMARY
          echo "To add feedback before approving, comment \`/feedback: ...\` on the issue." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 7: DevOps Agent — verify CI/CD
  # ===========================================================================
  devops-engineer:
    name: "🔴 DevOps Engineer Agent"
    needs: approve-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: "🚀 Verify CI/CD configuration"
        run: |
          echo "## 🔴 DevOps Agent" >> $GITHUB_STEP_SUMMARY
          echo "✅ CI/CD workflows verified" >> $GITHUB_STEP_SUMMARY
          echo "✅ Feature branch ready for QA" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 8: QA Agent — Real Flutter analyze + tests
  # ===========================================================================
  qa-engineer:
    name: "🟣 QA Engineer Agent"
    needs: devops-engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.3"
          channel: "stable"
          cache: true

      - name: "📦 Install dependencies"
        run: flutter pub get

      - name: "🔎 Flutter Analyze"
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze-output.txt
        continue-on-error: true

      - name: "🧪 Run Tests"
        run: flutter test --coverage 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: "📊 Post QA Results to Issue"
        if: env.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ANALYZE=$(cat /tmp/analyze-output.txt | tail -8)
          TESTS=$(cat /tmp/test-output.txt | tail -10)

          printf '## 🟣 QA Engineer Agent — Results\n\n```\nFlutter Analyze:\n%s\n\nTests:\n%s\n```\n' "$ANALYZE" "$TESTS" > /tmp/qa-comment.md
          gh issue comment "${{ env.ISSUE_NUMBER }}" \
            --repo ${{ env.GH_REPO }} \
            --body-file /tmp/qa-comment.md

  # ===========================================================================
  # Stage 9: Quality Gate — Create PR for review
  # ===========================================================================
  quality-gate:
    name: "🏁 Quality Gate — Create PR"
    needs: qa-engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.BRANCH_NAME }}

      - name: "🔀 Create Pull Request"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HU=$(cat docs/ai-output/user-stories.md 2>/dev/null | head -60 || echo "See issue for details")
          ISSUE_REF="${{ env.ISSUE_NUMBER != '' && format('Closes #{0}', env.ISSUE_NUMBER) || '' }}"

          printf '## 🤖 AI-Generated Feature\n\n%s\n\n## User Stories\n%s\n\n## What was generated\n- ✅ User Stories (PM Agent)\n- ✅ Supabase Migrations (Backend Agent)\n- ✅ Flutter Code — Brick, Riverpod, UI (Frontend Agent)\n- ✅ QA — Flutter analyze + tests\n\n---\n> This PR was generated by the AI Multi-Agent Pipeline.\n> Please review all files carefully before merging.\n' "$ISSUE_REF" "$HU" > /tmp/pr-body.md
          PR_URL=$(gh pr create \
            --title "feat: [AI Agent] feature for issue #${{ env.ISSUE_NUMBER }}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head ${{ env.BRANCH_NAME }} \
            --label "ai-generated" 2>&1 || echo "PR may already exist")

          echo "🔀 PR: $PR_URL" >> $GITHUB_STEP_SUMMARY

          if [ -n "${{ env.ISSUE_NUMBER }}" ]; then
            printf '## ✅ AI Pipeline Completed\n\n| Stage | Status |\n|-------|--------|\n| 🔵 Product Manager | ✅ Done |\n| 🟢 Backend Developer | ✅ Done |\n| 🟡 Frontend Developer | ✅ Done |\n| 🔴 DevOps | ✅ Done |\n| 🟣 QA Engineer | ✅ Done |\n\n🔀 **Pull Request created:** %s\n\nPlease review and approve the PR to trigger deployment.\nIssue will move to **Done** after successful deploy to stores.\n' "$PR_URL" > /tmp/completed-comment.md
            gh issue comment "${{ env.ISSUE_NUMBER }}" \
              --repo ${{ env.GH_REPO }} \
              --body-file /tmp/completed-comment.md
          fi
