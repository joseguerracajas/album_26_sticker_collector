# =============================================================================
# SonarQube Configuration — Album 26 Sticker Collector
# =============================================================================

sonar.projectKey=album_26_sticker_collector
sonar.projectName=Album 26 Sticker Collector
sonar.projectVersion=2.0.1

# Source configuration
sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Dart/Flutter specific
sonar.dart.file.suffixes=.dart

# Exclusions
sonar.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.mocks.dart,\
  **/generated/**,\
  **/brick/db/**,\
  **/l10n/generated/**,\
  build/**,\
  .dart_tool/**

# Test exclusions
sonar.test.exclusions=\
  test/**

# Coverage
sonar.dart.coverage.reportPaths=coverage/lcov.info

# Quality Gate thresholds
sonar.qualitygate.wait=true

# Duplications
sonar.cpd.minimumTokens=50
sonar.cpd.minimumLines=5
